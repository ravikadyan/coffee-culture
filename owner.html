<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Culture — Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; color: #1a1a1a; font-family: "Poppins", sans-serif; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid #eee; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .header-left h1 { font-size: 1.1rem; font-weight: 800; color: #1a1a1a; }
  .header-left span { font-size: 0.72rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .live-badge { display: flex; align-items: center; gap: 6px; background: #f0faf4; border: 1px solid #b7e4c7; border-radius: 20px; padding: 5px 12px; }
  .live-dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; animation: pulse 1.5s infinite; }
  .live-text { font-size: 0.75rem; font-weight: 700; color: #27ae60; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; padding: 13px 6px; text-align: center; font-size: 0.78rem; font-weight: 600; color: #999; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; min-width: 70px; }
  .tab.active { color: #1a1a1a; border-bottom-color: #e8a045; }
  .tab-content { display: none; padding: 14px; padding-bottom: 70px; }
  .tab-content.active { display: block; }
  .order-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); border-left: 4px solid #eee; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .order-card.pending { border-left-color: #e8a045; }
  .order-card.accepted { border-left-color: #27ae60; }
  .order-card.rejected { border-left-color: #e74c3c; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-table-badge { background: #1a1a1a; color: #e8a045; font-size: 0.82rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .order-meta { text-align: right; }
  .order-id { font-size: 0.72rem; color: #bbb; }
  .order-time { font-size: 0.75rem; color: #999; margin-top: 2px; }
  .order-customer { display: flex; gap: 16px; flex-wrap: wrap; background: #f8f8f8; border-radius: 10px; padding: 8px 12px; margin-bottom: 10px; }
  .cust-field .lbl { font-size: 0.68rem; color: #aaa; text-transform: uppercase; }
  .cust-field .val { font-size: 0.85rem; font-weight: 600; }
  .order-items-box { font-size: 0.85rem; color: #444; line-height: 1.8; padding: 8px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; margin-bottom: 10px; }
  .order-note { font-size: 0.8rem; color: #888; font-style: italic; margin-bottom: 10px; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .order-amount { font-size: 1rem; font-weight: 800; }
  .order-amount span { color: #e8a045; }
  .btn-row { display: flex; gap: 8px; }
  .btn-accept { padding: 8px 18px; background: #27ae60; color: #fff; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: "Poppins", sans-serif; }
  .btn-reject { padding: 8px 18px; background: #fff; color: #e74c3c; border: 1.5px solid #e74c3c; border-radius: 8px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: "Poppins", sans-serif; }
  .status-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
  .pill-pending { background: #fff8ee; color: #e8a045; border: 1px solid #fde8b8; }
  .pill-accepted { background: #f0faf4; color: #27ae60; border: 1px solid #b7e4c7; }
  .pill-rejected { background: #fdf0f0; color: #e74c3c; border: 1px solid #f5c6c6; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card { background: #fff; border-radius: 14px; padding: 20px 16px; text-align: center; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
  .stat-num { font-size: 1.8rem; font-weight: 800; color: #1a1a1a; }
  .stat-num.gold { color: #e8a045; }
  .stat-label { font-size: 0.75rem; color: #999; margin-top: 4px; font-weight: 500; }
  .empty-state { text-align: center; padding: 50px 20px; color: #bbb; }
  .empty-icon { font-size: 2.8rem; margin-bottom: 12px; }
  /* CALENDAR */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-nav-btn { background: #fff; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 6px 14px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: "Poppins", sans-serif; }
  .cal-month-title { font-size: 1rem; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
  .cal-day-label { text-align: center; font-size: 0.65rem; font-weight: 700; color: #aaa; padding: 4px 0; }
  .cal-day { background: #fff; border-radius: 10px; padding: 6px 4px; text-align: center; min-height: 54px; border: 1.5px solid #f0f0f0; cursor: pointer; transition: all 0.15s; }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: #1a1a1a; }
  .cal-day.selected { background: #1a1a1a; border-color: #1a1a1a; }
  .cal-day.selected .cal-dn { color: #e8a045; }
  .cal-day.selected .cal-da { color: #fff; }
  .cal-day.selected .cal-dc { color: #aaa; }
  .cal-day.has-orders { border-color: #e8a045; }
  .cal-dn { font-size: 0.78rem; font-weight: 600; color: #1a1a1a; }
  .cal-da { font-size: 0.62rem; color: #e8a045; font-weight: 700; margin-top: 2px; }
  .cal-dc { font-size: 0.58rem; color: #aaa; }
  .cal-detail { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); }
  .cal-detail-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
  .cal-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .cal-sum-card { background: #f8f8f8; border-radius: 10px; padding: 12px; text-align: center; }
  .cal-sum-num { font-size: 1.2rem; font-weight: 800; }
  .cal-sum-num.gold { color: #e8a045; }
  .cal-sum-label { font-size: 0.7rem; color: #999; margin-top: 2px; }
  .cal-order-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.83rem; }
  .cal-order-row:last-child { border-bottom: none; }
  /* TOAST */
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #1a1a1a; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; z-index: 500; transition: transform 0.35s ease; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .refresh-bar { text-align: center; font-size: 0.72rem; color: #bbb; padding: 10px; background: #fff; border-top: 1px solid #f0f0f0; position: fixed; bottom: 0; left: 0; right: 0; }
  /* LOGIN */
  .login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .login-card { background: #fff; border-radius: 18px; padding: 32px 24px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
  .login-logo { font-size: 2.2rem; margin-bottom: 6px; }
  .login-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
  .login-sub { font-size: 0.78rem; color: #aaa; margin-bottom: 24px; }
  .login-input { width: 100%; padding: 12px 14px; margin-bottom: 12px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 0.9rem; font-family: "Poppins", sans-serif; outline: none; transition: border-color 0.2s; }
  .login-input:focus { border-color: #1a1a1a; }
  .login-btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: "Poppins", sans-serif; }
  .login-err { color: #e74c3c; font-size: 0.82rem; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">&#x2615;</div>
    <div class="login-title">Coffee Culture</div>
    <div class="login-sub">Owner Dashboard</div>
    <input class="login-input" id="passInput" type="password" placeholder="Enter password">
    <button class="login-btn" id="loginBtn">Login</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>&#x2615; Coffee Culture</h1>
      <span>Owner Dashboard</span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span class="live-text">LIVE</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-btn-pending">&#x1F514; New <span id="pendingBadge"></span></div>
    <div class="tab" id="tab-btn-accepted">&#x1F373; Preparing</div>
    <div class="tab" id="tab-btn-history">&#x1F4CB; History</div>
    <div class="tab" id="tab-btn-stats">&#x1F4CA; Stats</div>
    <div class="tab" id="tab-btn-calendar">&#x1F4C5; Sales</div>
  </div>

  <div class="tab-content active" id="tab-pending"><div id="orders-pending"></div></div>
  <div class="tab-content" id="tab-accepted"><div id="orders-accepted"></div></div>
  <div class="tab-content" id="tab-history"><div id="orders-history"></div></div>
  <div class="tab-content" id="tab-stats"><div class="stats-grid" id="statsGrid"></div></div>
  <div class="tab-content" id="tab-calendar">
    <div class="cal-header">
      <button class="cal-nav-btn" id="prevMonth">&#8592;</button>
      <div class="cal-month-title" id="calMonthTitle"></div>
      <button class="cal-nav-btn" id="nextMonth">&#8594;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-detail" id="calDetail" style="display:none"></div>
  </div>

  <div class="refresh-bar" id="refreshBar">Connecting...</div>
</div>

<div class="toast" id="toast"></div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyLC4M9LIpWpE-45T8l3OVES6YVSn9S9H1-NGZ4o-koBzrpmp-O90w8_AQvsxo-hYrR/exec';
var OWNER_PASS = '12345';
var allOrders = [];
var lastCount = 0;
var calYear = new Date().getFullYear();
var calMonth = new Date().getMonth();
var selectedDay = null;

// LOGIN
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('passInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  var pass = document.getElementById('passInput').value;
  if (pass === OWNER_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    fetchOrders();
    setInterval(fetchOrders, 6000);
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password. Try again.';
  }
}

// TABS
var tabNames = ['pending', 'accepted', 'history', 'stats', 'calendar'];
tabNames.forEach(function(name) {
  document.getElementById('tab-btn-' + name).addEventListener('click', function() {
    switchTab(name);
  });
});

function switchTab(name) {
  tabNames.forEach(function(t) {
    document.getElementById('tab-btn-' + t).classList.remove('active');
    document.getElementById('tab-' + t).classList.remove('active');
  });
  document.getElementById('tab-btn-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'stats') renderStats();
  if (name === 'calendar') renderCalendar();
}

// FETCH
function fetchOrders() {
  fetch(SHEET_URL + '?action=getOrders')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.orders) return;
      if (lastCount > 0 && data.orders.length > lastCount) {
        var n = data.orders.length - lastCount;
        showToast('New order' + (n > 1 ? 's' : '') + ' received!');
        playBeep();
      }
      lastCount = data.orders.length;
      allOrders = data.orders;
      renderAll();
      document.getElementById('refreshBar').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-IN') + ' (auto every 6s)';
    })
    .catch(function() {
      document.getElementById('refreshBar').textContent = 'Connection error - retrying...';
    });
}

// RENDER
function renderAll() {
  var pending  = allOrders.filter(function(o) { return o.status === 'pending'; });
  var accepted = allOrders.filter(function(o) { return o.status === 'accepted'; });
  var history  = allOrders.filter(function(o) { return o.status === 'rejected' || o.status === 'completed'; });
  var pb = document.getElementById('pendingBadge');
  pb.textContent = pending.length > 0 ? '(' + pending.length + ')' : '';
  renderList('orders-pending',  pending,  'pending');
  renderList('orders-accepted', accepted, 'accepted');
  renderList('orders-history',  history,  'history');
}

function renderList(id, orders, type) {
  var el = document.getElementById(id);
  if (!orders.length) {
    var icons = { pending: '&#x1F514;', accepted: '&#x1F373;', history: '&#x1F4CB;' };
    var msgs  = { pending: 'No new orders', accepted: 'Nothing being prepared', history: 'No history yet' };
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + (icons[type] || '') + '</div><div>' + (msgs[type] || '') + '</div></div>';
    return;
  }
  var html = '';
  var sorted = orders.slice().reverse();
  for (var i = 0; i < sorted.length; i++) {
    html += buildOrderCard(sorted[i], type);
  }
  el.innerHTML = html;

  // Attach button events
  for (var j = 0; j < sorted.length; j++) {
    (function(order) {
      var acceptBtn = document.getElementById('accept-' + order.id);
      var rejectBtn = document.getElementById('reject-' + order.id);
      if (acceptBtn) acceptBtn.addEventListener('click', function() { updateStatus(order.id, 'accepted'); });
      if (rejectBtn) rejectBtn.addEventListener('click', function() { updateStatus(order.id, 'rejected'); });
    })(sorted[j]);
  }
}

function buildOrderCard(o, type) {
  var pillMap = { pending: 'pill-pending', accepted: 'pill-accepted', rejected: 'pill-rejected', completed: 'pill-completed' };
  var pill = '<span class="status-pill ' + (pillMap[o.status] || '') + '">' + o.status + '</span>';
  var note = o.note ? '<div class="order-note">Note: ' + o.note + '</div>' : '';
  var btns = '';
  if (type === 'pending') {
    btns = '<div class="btn-row">' +
      '<button class="btn-accept" id="accept-' + o.id + '">Accept</button>' +
      '<button class="btn-reject" id="reject-' + o.id + '">Reject</button>' +
      '</div>';
  } else if (type === 'accepted') {
    btns = '<div class="btn-row">' +
      '<button class="btn-reject" id="reject-' + o.id + '">Cancel</button>' +
      '</div>';
  }
  return '<div class="order-card ' + o.status + '">' +
    '<div class="order-top">' +
      '<span class="order-table-badge">Table ' + o.table + '</span>' +
      '<div class="order-meta">' + pill + '<div class="order-id">#' + o.id + '</div><div class="order-time">' + (o.time || '') + '</div></div>' +
    '</div>' +
    '<div class="order-customer">' +
      '<div class="cust-field"><div class="lbl">Name</div><div class="val">' + o.name + '</div></div>' +
      '<div class="cust-field"><div class="lbl">Phone</div><div class="val">' + o.phone + '</div></div>' +
    '</div>' +
    '<div class="order-items-box">' + o.items + '</div>' +
    note +
    '<div class="order-footer">' +
      '<div class="order-amount">Total: <span>Rs ' + o.total + '</span></div>' +
      btns +
    '</div>' +
    '</div>';
}

// UPDATE STATUS
function updateStatus(id, status) {
  fetch(SHEET_URL + '?action=updateStatus&id=' + id + '&status=' + status)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        showToast(status === 'accepted' ? 'Order Accepted!' : 'Order Rejected');
        fetchOrders();
      }
    })
    .catch(function() {
      var o = allOrders.find(function(x) { return x.id === id; });
      if (o) { o.status = status; renderAll(); }
    });
}

// STATS
function renderStats() {
  var revenue = allOrders.filter(function(o) { return o.status !== 'rejected'; })
    .reduce(function(s, o) { return s + parseInt(o.total || 0); }, 0);
  document.getElementById('statsGrid').innerHTML =
    sc(allOrders.length, 'Total Orders', false) +
    sc('Rs ' + revenue, 'Total Revenue', true) +
    sc(allOrders.filter(function(o){return o.status==='pending';}).length, 'Pending Now', false) +
    sc(allOrders.filter(function(o){return o.status==='accepted';}).length, 'Preparing', false);
}
function sc(n, l, g) {
  return '<div class="stat-card"><div class="stat-num' + (g ? ' gold' : '') + '">' + n + '</div><div class="stat-label">' + l + '</div></div>';
}

// CALENDAR
document.getElementById('prevMonth').addEventListener('click', function() { changeMonth(-1); });
document.getElementById('nextMonth').addEventListener('click', function() { changeMonth(1); });

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  selectedDay = null;
  renderCalendar();
}

function renderCalendar() {
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthTitle').textContent = months[calMonth] + ' ' + calYear;

  var dailyMap = {};
  allOrders.filter(function(o) { return o.status !== 'rejected'; }).forEach(function(o) {
    if (!o.time) return;
    var datePart = o.time.split(' ')[0];
    if (!dailyMap[datePart]) dailyMap[datePart] = { total: 0, orders: [] };
    dailyMap[datePart].total += parseInt(o.total || 0);
    dailyMap[datePart].orders.push(o);
  });

  var today = new Date();
  var firstDay = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  var dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var html = dayLabels.map(function(d) { return '<div class="cal-day-label">' + d + '</div>'; }).join('');
  for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var dd = String(d).padStart(2, '0');
    var mm = String(calMonth + 1).padStart(2, '0');
    var dateKey = dd + '-' + mm + '-' + calYear;
    var dayData = dailyMap[dateKey];
    var isToday = (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear());
    var isSelected = selectedDay === dateKey;

    var cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (dayData) cls += ' has-orders';

    html += '<div class="' + cls + '" data-key="' + dateKey + '">' +
      '<div class="cal-dn">' + d + '</div>' +
      (dayData ? '<div class="cal-da">Rs ' + dayData.total + '</div><div class="cal-dc">' + dayData.orders.length + ' orders</div>' : '') +
      '</div>';
  }

  var grid = document.getElementById('calGrid');
  grid.innerHTML = html;

  grid.querySelectorAll('.cal-day:not(.empty)').forEach(function(el) {
    el.addEventListener('click', function() {
      var key = this.getAttribute('data-key');
      selectedDay = key;
      renderCalendar();
      showDayDetail(key, dailyMap[key]);
    });
  });

  if (selectedDay && dailyMap[selectedDay]) {
    showDayDetail(selectedDay, dailyMap[selectedDay]);
  } else if (selectedDay) {
    showDayDetail(selectedDay, null);
  }
}

function showDayDetail(dateKey, data) {
  var detail = document.getElementById('calDetail');
  if (!data) {
    detail.innerHTML = '<div class="cal-detail-title">&#x1F4C5; ' + dateKey + '</div><div style="color:#bbb;text-align:center;padding:20px;font-size:0.85rem">No orders on this day</div>';
    detail.style.display = 'block';
    return;
  }
  var html = '<div class="cal-detail-title">&#x1F4C5; ' + dateKey + '</div>' +
    '<div class="cal-summary">' +
    '<div class="cal-sum-card"><div class="cal-sum-num">' + data.orders.length + '</div><div class="cal-sum-label">Orders</div></div>' +
    '<div class="cal-sum-card"><div class="cal-sum-num gold">Rs ' + data.total + '</div><div class="cal-sum-label">Revenue</div></div>' +
    '</div>';
  data.orders.forEach(function(o) {
    html += '<div class="cal-order-row">' +
      '<div><strong>Table ' + o.table + '</strong> &mdash; ' + o.name + '<br><span style="color:#aaa;font-size:0.75rem">' + o.items + '</span></div>' +
      '<div style="text-align:right;padding-left:10px;flex-shrink:0"><strong>Rs ' + o.total + '</strong></div>' +
      '</div>';
  });
  detail.innerHTML = html;
  detail.style.display = 'block';
}

// TOAST & BEEP
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}
</script>
